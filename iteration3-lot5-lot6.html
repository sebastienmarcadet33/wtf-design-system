  (function() {
    const origConsoleError = window.console && window.console.error;
    if (origConsoleError) {
      window.console.error = function(...args) {
        const msg = args[0] && args[0].toString ? args[0].toString() : '';
        if (/ResizeObserver loop/.test(msg)) return;
        return origConsoleError.apply(window.console, args);
      };
    }
    window.addEventListener('error', function(e) {
      if (e.message && /ResizeObserver loop/.test(e.message)) {
        e.stopImmediatePropagation();
        e.preventDefault();
        return false;
      }
    }, true);
    window.addEventListener('unhandledrejection', function(e) {
      if (e.reason && /ResizeObserver loop/.test(String(e.reason))) {
        e.preventDefault();
      }
    });
  })();
</script>

  <script type="text/babel" data-presets="react">
    // Boot — attend que tous les scripts babel inline+src soient transpilés et
    // que les composants soient assignés à window. Babel-standalone charge les
    // scripts src en async ; on poll avec un timeout généreux.
    (function boot(tries = 0) {
      const needed = [
        'DesignCanvas','DCSection','DCArtboard',
        'T','Frame','ArtbgL4','MetaL4','NoteCard',
        'WordmarkEES','WordmarkSES','WordmarkWTF','WordmarkVoie',
        'TriangleSes','PapillonGold','MonogrammePhoenix',
        'PhotoSlot','TitreL4','SignatureL4','TaglineL4','Filet',
        'LogoWTF','LogoAVE','SwapStatus',
        'LogoManifesteWTF','LogoFaviconWTF','LogoFaviconAVE','LogoEESFavicon',
        'CarrA1','CarrA5','CarrB1','CarrB6','CarrC1','CarrC5','CarrD1','CarrD5',
        'DocH1','DocH2','DocH3','DocH4','DocH5',
        'Lot56App',
      ];
      const missing = needed.filter((k) => !window[k]);
      if (missing.length === 0) {
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<window.Lot56App />);
        return;
      }
      if (tries > 60) {
        document.getElementById('root').innerHTML =
          '<div class="booting">Composants manquants après 12s : <code>' +
          missing.join(', ') + '</code>. Vérifier les fichiers JSX référencés.</div>';
        return;
      }
      setTimeout(() => boot(tries + 1), 200);
    })();
  </script>
